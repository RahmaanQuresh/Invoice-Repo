name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: deathear/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: deathear

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: deathear

      - name: Lint
        run: npm run lint
        working-directory: deathear

      - name: Build (type check)
        run: npm run build
        working-directory: deathear

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deathear
          POSTGRES_PASSWORD: deathear
          POSTGRES_DB: deathear_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: deathear/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: deathear

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: deathear

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test

      - name: Run tests
        run: npm test
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test
          AUTH_SECRET: test-secret-thirty-two-characters-minimum
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          RESEND_API_KEY: re_test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deathear
          POSTGRES_PASSWORD: deathear
          POSTGRES_DB: deathear_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: deathear/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: deathear

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: deathear

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: deathear

      - name: Seed database
        run: npx prisma db seed
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test
          ADMIN_EMAIL: admin@deathear.test
          ADMIN_PASSWORD: TestAdmin123!

      - name: Build Next.js
        run: npm run build
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test
          AUTH_SECRET: test-secret-thirty-two-characters-minimum
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: deathear
        env:
          DATABASE_URL: postgresql://deathear:deathear@localhost:5432/deathear_test
          AUTH_SECRET: test-secret-thirty-two-characters-minimum
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          TEST_USER_EMAIL: admin@deathear.test
          TEST_USER_PASSWORD: TestAdmin123!

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: deathear/playwright-report/
          retention-days: 7
